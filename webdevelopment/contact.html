        <section class="contact">
        <h1>
            Contact Info
        </h1>

        <!--Contact Form begins here-->
        <form class="form" action="#" method="post">
        <!--Title-->
        <label for="title">Title</label>
        <select id="title" name="title" required>
            <option value="" selected disabled>Select your title</option>
            <option value="Mr.">Mr.</option>
            <option value="Mrs.">Mrs.</option>
            <option value="Ms.">Ms.</option>
            <option value="Dr.">Dr.</option>
        </select>

        <!--Full Name-->
        <label for="fullname">Full Name</label>
            <input type="text"
                id="fullname"
                name="fullname"
                placeholder="Enter your full name"
                required>

        <!--Email Address-->
        <label for="email">Email Address</label>
            <input type="email"
                id="email"
                name="email"
                placeholder="Enter your email address"
                required>
        
        <!--Message-->
        <label for="message">Message</label>
            <textarea 
                id="message"
                name="message"
                placeholder="Enter a message"
                required></textarea>

        <!--Reason for Contact-->
        <label for="selectmenu">Reason for Contact</label>
        <select id="selectmenu" name="selectmenu" required>
            <option value="" selected disabled>Reason for Contact</option>
            <option value="Question">Question</option>
            <option value="Job Opportunity">Job Opportunity</option>
            <option value="Advice/Feedback">Advice/Feedback</option>
            <option value="Other">Other</option>
        </select>

        <!--Submission Button-->
        <input type="submit">
        </form>
        </section>
